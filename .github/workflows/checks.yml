# Agent-maintenance gate. Every PR (adapter fixes, new utilities, feedback-driven changes) must pass
# these before merge — the deterministic guardrails that let a Claude agent ship a change safely:
#   1. every .mjs still parses,
#   2. every utilities/<id>.json config is valid and references a real adapter,
#   3. all adapter golden tests pass (the fix actually produces the canonical shape).
# (Reconciliation-of-deployed-data is added once the data branch exists — Phase 1/3.)
name: checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: All scripts/adapters parse
        run: |
          for f in scripts/*.mjs scripts/lib/*.mjs adapters/*.mjs poster/*.mjs poster/platforms/*.mjs; do
            [ -e "$f" ] || continue
            node --check "$f" && echo "ok $f"
          done

      - name: Utility configs are valid
        run: node scripts/validate_configs.mjs

      - name: Adapter golden tests
        run: node scripts/test_adapters.mjs

      - name: Geo-resolution golden tests
        run: node scripts/test_geo.mjs

      - name: Recovery-ETA tests
        run: node scripts/test_eta.mjs

      - name: CSP / page-structure audit
        run: node scripts/audit_csp.mjs

      - name: ToS guard (poweroutage off without a license key)
        run: node scripts/audit_tos.mjs

      - name: Audit the auditors
        run: node scripts/test_audits.mjs

      - name: Auto-poster tests (detection/throttle replay + facets)
        run: node scripts/test_poster.mjs
